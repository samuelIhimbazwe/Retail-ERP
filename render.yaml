# Render = API only (Express + Prisma + Neon)
# Vercel = Web UI (Next.js) pointing at this API via API_URL

services:
  - type: web
    name: rbiap-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: AUTH_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
